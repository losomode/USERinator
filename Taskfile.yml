version: '3'

set:
  - errexit
  - nounset
  - pipefail

env:
  PATH: "{{.ROOT_DIR}}/.venv/bin:{{.PATH}}"

vars:
  PROJECT_NAME: Userinator
  BACKEND_DIR: backend
  FRONTEND_DIR: frontend
  COVERAGE_THRESHOLD: 85

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list
    silent: true

  # === Backend Tasks ===

  backend:install:
    desc: Create venv and install backend dependencies
    cmds:
      - test -d "{{.ROOT_DIR}}/.venv" || python3 -m venv "{{.ROOT_DIR}}/.venv"
      - "{{.ROOT_DIR}}/.venv/bin/pip install -r {{.BACKEND_DIR}}/requirements.txt"

  backend:migrate:
    desc: Run Django migrations
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - "{{.ROOT_DIR}}/.venv/bin/python manage.py migrate"

  backend:makemigrations:
    desc: Create new Django migrations
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - "{{.ROOT_DIR}}/.venv/bin/python manage.py makemigrations"

  backend:test:
    desc: Run backend tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - "{{.ROOT_DIR}}/.venv/bin/python manage.py test"

  backend:test:coverage:
    desc: Run backend tests with coverage report
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - ../.venv/bin/coverage run --source='.' manage.py test
      - ../.venv/bin/coverage report --omit="*/tests.py,*/test_*.py,*/migrations/*,*/venv/*,manage.py,*/admin.py,*/__init__.py,*/apps.py"
      - echo ""
      - ../.venv/bin/coverage report --omit="*/tests.py,*/test_*.py,*/migrations/*,*/venv/*,manage.py,*/admin.py,*/__init__.py,*/apps.py" | tail -1 | awk '{if ($NF+0 >= {{.COVERAGE_THRESHOLD}}) print "✓ Coverage threshold met (≥{{.COVERAGE_THRESHOLD}}%)"; else {print "✗ Coverage below threshold (" $NF " < {{.COVERAGE_THRESHOLD}}%)"; exit 1}}'

  backend:lint:
    desc: Lint backend code
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - |
        if command -v ruff >/dev/null 2>&1; then
          ruff check .
        else
          echo "⚠ ruff not installed. Install with: pip install ruff"
        fi

  backend:fmt:
    desc: Format backend code
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - |
        if command -v black >/dev/null 2>&1; then
          black .
        else
          echo "⚠ black not installed. Install with: pip install black"
        fi

  backend:dev:
    desc: Start Django development server on port 8004
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - "{{.ROOT_DIR}}/.venv/bin/python manage.py runserver 8004"

  backend:shell:
    desc: Open Django shell
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - "{{.ROOT_DIR}}/.venv/bin/python manage.py shell"

  backend:manage:
    desc: "Run arbitrary Django management command (usage: task backend:manage -- command args)"
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - "{{.ROOT_DIR}}/.venv/bin/python manage.py {{.CLI_ARGS}}"

  # === Frontend Tasks ===

  frontend:install:
    desc: Install frontend dependencies
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm install
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/**

  frontend:dev:
    desc: Start frontend development server
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run dev

  frontend:build:
    desc: Build frontend for production
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run build

  frontend:preview:
    desc: Preview production build
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run preview

  frontend:lint:
    desc: Lint frontend code
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run lint

  frontend:typecheck:
    desc: Run TypeScript type checking
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run typecheck

  frontend:fmt:
    desc: Format frontend code
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - |
        if grep -q '"format"' package.json 2>/dev/null; then
          npm run format
        else
          echo "⚠ No format script configured in package.json"
        fi

  frontend:test:
    desc: Run frontend tests
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm test

  frontend:test:coverage:
    desc: Run frontend tests with coverage report
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run test:coverage

  # === Combined Project Tasks ===

  install:
    desc: Install all dependencies (backend + frontend)
    deps:
      - backend:install
      - frontend:install

  dev:
    desc: Start both development servers
    cmds:
      - |
        echo "Start backend with: task backend:dev"
        echo "Start frontend with: task frontend:dev"
        echo ""
        echo "Or run both in parallel:"
        echo "  task backend:dev & task frontend:dev"

  test:
    desc: Run all tests
    deps:
      - backend:test

  test:coverage:
    desc: Run tests with coverage (≥{{.COVERAGE_THRESHOLD}}%)
    deps:
      - backend:test:coverage

  lint:
    desc: Lint all code
    deps:
      - backend:lint

  fmt:
    desc: Format all code
    deps:
      - backend:fmt

  check:
    desc: Run pre-commit checks (fmt, lint, test, coverage)
    deps:
      - fmt
      - lint
      - test:coverage
    cmds:
      - echo "✓ All checks passed"

  build:
    desc: Build project for production
    deps:
      - frontend:build
    cmds:
      - echo "✓ Project built successfully"

  clean:
    desc: Clean build artifacts and caches
    cmds:
      - rm -rf {{.BACKEND_DIR}}/__pycache__
      - rm -rf {{.BACKEND_DIR}}/**/__pycache__
      - rm -rf {{.BACKEND_DIR}}/.coverage
      - rm -rf {{.BACKEND_DIR}}/.pytest_cache
      - rm -rf {{.BACKEND_DIR}}/db.sqlite3
      - rm -rf {{.FRONTEND_DIR}}/dist
      - rm -rf {{.FRONTEND_DIR}}/node_modules/.vite
      - echo "✓ Cleaned artifacts"

  clean:all:
    desc: Clean everything including dependencies
    deps:
      - clean
    cmds:
      - rm -rf .venv
      - rm -rf {{.FRONTEND_DIR}}/node_modules
      - echo "✓ Cleaned all artifacts and dependencies"

  db:reset:
    desc: Reset database (WARNING - Deletes all data)
    dir: "{{.BACKEND_DIR}}"
    prompt: "This will delete all data. Continue?"
    cmds:
      - rm -f db.sqlite3
      - "{{.ROOT_DIR}}/.venv/bin/python manage.py migrate"
      - echo "✓ Database reset complete"

  stats:
    desc: Show project statistics
    cmds:
      - |
        echo "{{.PROJECT_NAME}} Statistics:"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "Backend:"
        echo "  Python files:    $(find {{.BACKEND_DIR}} -name '*.py' -not -path '*/migrations/*' -not -path '*/venv/*' | wc -l | tr -d ' ')"
        echo "  Test files:      $(find {{.BACKEND_DIR}} -name 'test_*.py' -o -name 'tests.py' | wc -l | tr -d ' ')"
        echo "  Migrations:      $(find {{.BACKEND_DIR}} -path '*/migrations/*.py' -not -name '__init__.py' | wc -l | tr -d ' ')"
        echo ""
        echo "Frontend:"
        echo "  TypeScript/JS:   $(find {{.FRONTEND_DIR}}/src -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.jsx' 2>/dev/null | wc -l | tr -d ' ')"
        echo "  Components:      $(find {{.FRONTEND_DIR}}/src -name '*.tsx' -o -name '*.jsx' 2>/dev/null | wc -l | tr -d ' ')"
        echo ""
        echo "Documentation:    $(find . -name '*.md' -not -path './node_modules/*' -not -path './.venv/*' | wc -l | tr -d ' ')"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
